<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Nothing gives one person so much advantage over another as</tspan>
    <tspan x="60.0" y="69">to remain always cool and unruffled under all</tspan>
    <tspan x="60.0" y="93">circumstances.» — Thomas Jefferson</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Ничто не дает одному человеку такого большого преимущества перед</tspan>
    <tspan x="60.0" y="140">другим, как оставаться всегда хладнокровным и невозмутимым при любых</tspan>
    <tspan x="60.0" y="155">обстоятельствах.» — Томас Джефферсон</tspan>
  </text>
</svg>