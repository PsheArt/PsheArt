<svg width="600" height="146" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="146" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Sometimes it is more important to discover what one cannot</tspan>
    <tspan x="60.0" y="69">do, than what one can do.» — Lin Yutang</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="101">«Иногда важнее обнаружить то, чего человек не может сделать, чем то,</tspan>
    <tspan x="60.0" y="116">что он может сделать.» — Линь Ютан</tspan>
  </text>
</svg>