<svg width="600" height="146" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="146" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«The more you are grateful for what you have the more you</tspan>
    <tspan x="60.0" y="69">will have to be grateful for.» — Zig Ziglar</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="101">«Чем больше вы благодарны за то, что у вас есть, тем больше вам</tspan>
    <tspan x="60.0" y="116">придется быть благодарным за это.» — Зиг Зиглар</tspan>
  </text>
</svg>