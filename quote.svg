<svg width="600" height="146" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="146" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Change is hard at first, messy in the middle and gorgeous</tspan>
    <tspan x="60.0" y="69">at the end.» — Robin Sharma</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="101">«Изменения поначалу трудны, в середине беспорядочны, а в конце</tspan>
    <tspan x="60.0" y="116">великолепны.» — Робин Шарма</tspan>
  </text>
</svg>