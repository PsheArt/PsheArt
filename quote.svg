<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Making money isn't hard in itself... What's hard is to earn</tspan>
    <tspan x="60.0" y="69">it doing something worth devoting one's life to.» — Carlos</tspan>
    <tspan x="60.0" y="93">Ruiz Zafon</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Зарабатывать деньги само по себе несложно... Трудно заработать их,</tspan>
    <tspan x="60.0" y="140">занимаясь чем-то, чему стоит посвятить свою жизнь.» — Карлос Руис</tspan>
    <tspan x="60.0" y="155">Сафон</tspan>
  </text>
</svg>