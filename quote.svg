<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Ancient Rule of Twenty-one: if you do anything for</tspan>
    <tspan x="60.0" y="69">twenty-one days in a row, it will be installed as a habit.»</tspan>
    <tspan x="60.0" y="93">— Robin Sharma</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Древнее правило двадцати одного: если вы делаете что-либо двадцать</tspan>
    <tspan x="60.0" y="140">один день подряд, это войдет в привычку.» — Робин Шарма</tspan>
  </text>
</svg>