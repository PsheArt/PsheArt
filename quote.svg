<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«A pessimist sees the difficulty in every opportunity; an</tspan>
    <tspan x="60.0" y="69">optimist sees the opportunity in every difficulty.» —</tspan>
    <tspan x="60.0" y="93">Winston Churchill</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Пессимист видит трудности в каждой возможности; оптимист видит</tspan>
    <tspan x="60.0" y="140">возможности в каждой трудности.» — Уинстон Черчилль</tspan>
  </text>
</svg>