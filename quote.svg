<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Only one thing is ever guaranteed, that is that you will</tspan>
    <tspan x="60.0" y="69">definitely not achieve the goal if you don't take the shot.»</tspan>
    <tspan x="60.0" y="93">— Wayne Gretzky</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Всегда гарантировано только одно: вы точно не достигнете цели, если</tspan>
    <tspan x="60.0" y="140">не сделаете выстрел.» — Уэйн Гретцки</tspan>
  </text>
</svg>