<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Wherever there is danger, there lurks opportunity; wherever</tspan>
    <tspan x="60.0" y="69">there is opportunity, there lurks danger. The two are</tspan>
    <tspan x="60.0" y="93">inseparable.» — Earl Nightingale</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Везде, где есть опасность, таятся возможности; везде, где есть</tspan>
    <tspan x="60.0" y="140">возможность, таится опасность. Эти двое неразделимы.» — Эрл Найтингейл</tspan>
  </text>
</svg>