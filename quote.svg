<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«We never know how high we are till we are called to rise.</tspan>
    <tspan x="60.0" y="69">Then if we are true to form our statures touch the skies.» —</tspan>
    <tspan x="60.0" y="93">Emily Dickinson</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Мы никогда не узнаем, насколько высоко мы находимся, пока нас не</tspan>
    <tspan x="60.0" y="140">призовут подняться. Тогда, если мы верны формированию своего роста, мы</tspan>
    <tspan x="60.0" y="155">коснемся небес.» — Эмили Дикинсон</tspan>
  </text>
</svg>