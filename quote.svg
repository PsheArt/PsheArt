<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Freedom is the only worthy goal in life. It is won by</tspan>
    <tspan x="60.0" y="69">disregarding things that lie beyond our control.» —</tspan>
    <tspan x="60.0" y="93">Epictetus</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Свобода – единственная достойная цель в жизни. Его можно достичь,</tspan>
    <tspan x="60.0" y="140">игнорируя вещи, которые находятся вне нашего контроля.» — Эпиктет</tspan>
  </text>
</svg>