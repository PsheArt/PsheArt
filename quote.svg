<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Most of us live our lives by accident - we live as it</tspan>
    <tspan x="60.0" y="69">happens. Fulfilment comes when we live our lives on</tspan>
    <tspan x="60.0" y="93">purpose.» — Simon Sinek</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Большинство из нас проживают свою жизнь случайно – мы живем так, как</tspan>
    <tspan x="60.0" y="140">сложилось. Удовлетворение приходит, когда мы живём целенаправленно.» —</tspan>
    <tspan x="60.0" y="155">Саймон Синек</tspan>
  </text>
</svg>