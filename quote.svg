<svg width="600" height="146" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="146" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«You don't have to control your thoughts; you just have to</tspan>
    <tspan x="60.0" y="69">stop letting them control you.» — Dan Millman</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="101">«Вам не нужно контролировать свои мысли; тебе просто нужно перестать</tspan>
    <tspan x="60.0" y="116">позволять им контролировать тебя.» — Дэн Миллман</tspan>
  </text>
</svg>