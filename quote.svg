<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Winners are not afraid of losing. But losers are. Failure</tspan>
    <tspan x="60.0" y="69">is part of the process of success. People who avoid failure</tspan>
    <tspan x="60.0" y="93">also avoid success.» — Robert Kiyosaki</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Победители не боятся проиграть. Но проигравшие есть. Неудача – это</tspan>
    <tspan x="60.0" y="140">часть процесса успеха. Люди, которые избегают неудач, избегают и</tspan>
    <tspan x="60.0" y="155">успеха.» — Роберт Кийосаки</tspan>
  </text>
</svg>