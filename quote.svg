<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«The best and most beautiful things in the world cannot be</tspan>
    <tspan x="60.0" y="69">seen or even touched - they must be felt with the heart.» —</tspan>
    <tspan x="60.0" y="93">Helen Keller</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Самые лучшие и красивые вещи в мире нельзя увидеть и даже потрогать –</tspan>
    <tspan x="60.0" y="140">их нужно почувствовать сердцем.» — Хелен Келлер</tspan>
  </text>
</svg>