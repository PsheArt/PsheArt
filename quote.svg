<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Take the attitude of a student. Never be too big to ask</tspan>
    <tspan x="60.0" y="69">questions. Never know too much to learn something new.» — Og</tspan>
    <tspan x="60.0" y="93">Mandino</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Возьмите позицию студента. Никогда не будьте слишком большим, чтобы</tspan>
    <tspan x="60.0" y="140">задавать вопросы. Никогда не знайте слишком много, чтобы узнать что-то</tspan>
    <tspan x="60.0" y="155">новое.» — Ог Мандино</tspan>
  </text>
</svg>