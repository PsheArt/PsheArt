<svg width="600" height="170" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="170" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«A man, as a general rule, owes very little to what he is</tspan>
    <tspan x="60.0" y="69">born with - a man is what he makes of himself.» — Alexander</tspan>
    <tspan x="60.0" y="93">Graham Bell</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Человек, как правило, очень мало обязан тому, с чем он родился:</tspan>
    <tspan x="60.0" y="140">человек есть то, чем он себя делает.» — Александр Грэм Белл</tspan>
  </text>
</svg>