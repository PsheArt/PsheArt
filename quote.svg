<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Life is about accepting the challenges along the way,</tspan>
    <tspan x="60.0" y="69">choosing to keep moving forward, and savoring the journey.»</tspan>
    <tspan x="60.0" y="93">— Roy T. Bennett</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Жизнь заключается в том, чтобы принимать вызовы на своем пути,</tspan>
    <tspan x="60.0" y="140">выбирать продолжать двигаться вперед и наслаждаться путешествием.» —</tspan>
    <tspan x="60.0" y="155">Рой Т. Беннетт</tspan>
  </text>
</svg>