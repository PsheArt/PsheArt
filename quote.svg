<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Youth ages, immaturity is outgrown, ignorance can be</tspan>
    <tspan x="60.0" y="69">educated, and drunkenness sobered, but stupid lasts</tspan>
    <tspan x="60.0" y="93">forever.» — Aristophanes</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Молодость стареет, незрелость перерастает, невежество можно</tspan>
    <tspan x="60.0" y="140">воспитать, а пьянство отрезвить, но глупость длится вечно.» —</tspan>
    <tspan x="60.0" y="155">Аристофан</tspan>
  </text>
</svg>