<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«If you cling to a certain thought with dynamic will power,</tspan>
    <tspan x="60.0" y="69">it finally assumes a tangible outward form.» — Paramahansa</tspan>
    <tspan x="60.0" y="93">Yogananda</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Если вы цепляетесь за определенную мысль с динамической силой воли,</tspan>
    <tspan x="60.0" y="140">она, наконец, принимает осязаемую внешнюю форму.» — Парамаханса</tspan>
    <tspan x="60.0" y="155">Йогананда</tspan>
  </text>
</svg>