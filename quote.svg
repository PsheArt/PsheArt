<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Having an open mind is one of the most important qualities</tspan>
    <tspan x="60.0" y="69">we can possess. Once our minds close, we stop evolving.» —</tspan>
    <tspan x="60.0" y="93">Yanni</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Открытость ума — одно из самых важных качеств, которыми мы можем</tspan>
    <tspan x="60.0" y="140">обладать. Как только наш разум закрывается, мы перестаем развиваться.»</tspan>
    <tspan x="60.0" y="155">— Янни</tspan>
  </text>
</svg>