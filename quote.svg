<svg width="600" height="185" xmlns="http://www.w3.org/2000/svg">
  <style>
    .quote { font: italic 17px Georgia, 'Times New Roman', serif; fill: #58a6ff; }
    .translation { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #8b949e; }
  </style>
  <rect width="100%" height="185" fill="#141321" rx="12" ry="12"/>
  <text class="quote">
    <tspan x="60.0" y="45">«Don't worry about being successful, but work toward being</tspan>
    <tspan x="60.0" y="69">significant and the success will naturally follow.» — Oprah</tspan>
    <tspan x="60.0" y="93">Winfrey</tspan>
  </text>
  <text class="translation">
    <tspan x="60.0" y="125">«Не беспокойтесь об успехе, но стремитесь к тому, чтобы стать</tspan>
    <tspan x="60.0" y="140">значимым, и успех естественным образом последует за вами.» — Опра</tspan>
    <tspan x="60.0" y="155">Уинфри</tspan>
  </text>
</svg>